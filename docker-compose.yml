services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
      - vercel_app/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-8bit}
      POSTGRES_USER: ${POSTGRES_USER:-8bit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-8bit_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8010:8000"
    env_file:
      - .env
      - vercel_app/.env
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: ${POSTGRES_DB:-8bit}
      DATABASE_USER: ${POSTGRES_USER:-8bit}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-8bit_local_dev}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
