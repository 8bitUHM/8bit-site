{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}8bit @ UH Manoa{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{% static 'main_app/assets/8bit-logo.webp' %}"
    />
  </head>

  <body class="site" data-theme="light">
    <script>
      (function(){var t=localStorage.getItem('8bit-theme')||'light';document.body.setAttribute('data-theme',t);})();
    </script>
    {% include "main_app/components/navbar.html" %}
    <main>
      {% block content %}
      {% endblock %}
    </main>
    {% include "main_app/components/footer.html" %}
  </body>
</html>
