name: 8bit Site Deploy to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/ecr-image-push.yaml'

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Create production .env
        run: |
          {
            echo "PROJECT_SECRET=${{ secrets.PROJECT_SECRET }}"
            echo "POSTGRES_DB=8bit"
            echo "POSTGRES_USER=8bit"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "DATABASE_HOST=db"
            echo "DATABASE_NAME=8bit"
            echo "DATABASE_USER=8bit"
            echo "DATABASE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "ALLOWED_HOSTS_EXTRA=${{ secrets.PROD_SSH_HOST }},8bithawaii.org,staging.8bithawaii.org"
          } > .env

      - name: Copy project to server
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.PROD_SSH_USER }}
          SERVER_HOST: ${{ secrets.PROD_SSH_HOST }}
        run: |
          echo "$SSH_KEY" > ssh_key
          chmod 600 ssh_key
          ssh -i ssh_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "mkdir -p ~/8bit-site"
          scp -i ssh_key -o StrictHostKeyChecking=no -r \
            docker-compose.prod.yml \
            dockerfile \
            .dockerignore \
            .env \
            requirements.txt \
            manage.py \
            scripts \
            vercel_app \
            main_app \
            learning \
            api \
            client \
            db_file_storage \
            $SERVER_USER@$SERVER_HOST:~/8bit-site/

      - name: Deploy with Docker Compose
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
            cd ~/8bit-site
            sudo docker compose -f docker-compose.prod.yml up -d --build
            sudo docker compose -f docker-compose.prod.yml ps
            sudo docker builder prune --force
            sudo docker image prune --force
            echo "Deployment complete"
          EOF
