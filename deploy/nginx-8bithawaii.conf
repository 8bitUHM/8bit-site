# Reverse proxy for the 8bit site.
# The Django app (Gunicorn) runs in Docker, published on host port 8010
# (see docker-compose.prod.yml). nginx terminates HTTP/HTTPS and proxies to it.
#
# Install:
#   sudo cp deploy/nginx-8bithawaii.conf /etc/nginx/sites-available/8bithawaii
#   sudo ln -s /etc/nginx/sites-available/8bithawaii /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add HTTPS (certbot rewrites this file to add the 443 server + redirect):
#   sudo certbot --nginx -d 8bithawaii.org -d www.8bithawaii.org

server {
    listen 80;
    listen [::]:80;
    server_name 8bithawaii.org www.8bithawaii.org;

    # Max upload size (db_file_storage stores uploads in Postgres)
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
