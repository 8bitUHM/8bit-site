<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 24px 0 30px; box-sizing: border-box; font-family: var(--font-sans); background: linear-gradient(135deg,#2dd4bf,#0ea5e9); }
  .nav { margin: 0 24px; background: rgba(255,255,255,.9); backdrop-filter: blur(12px); box-shadow: var(--shadow-soft); border-radius: 9999px; padding: 12px 20px; display:flex; align-items:center; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand img { height: 30px; width:auto; border-radius:8px; }
  .brand span { font-family:var(--font-display); font-weight:700; font-size:16px; color:var(--fg-1); }
  .links { display:flex; gap:6px; }
  .links a { font-weight:700; font-size:13px; padding:8px 16px; border-radius:9999px; color:var(--gray-700); }
  .links a.active { background:var(--primary-500); color:#fff; box-shadow:var(--shadow-pop-primary); }
</style>
</head>
<body>
  <nav class="nav">
    <div class="brand"><img src="../assets/8bit-logo.webp" alt="8bit"><span>8bit at UH Mānoa</span></div>
    <div class="links"><a class="active">Home</a><a>Members</a><a>Projects</a><a>Services</a></div>
  </nav>
</body>
</html>
