<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; box-sizing: border-box; display:flex; }
  .cell { flex:1; display:flex; align-items:center; justify-content:center; padding: 36px 20px; }
  .teal { background: var(--primary-600); }
  .white { background: #fff; }
  .soft { background: var(--primary-50); }
  .cell img { max-width: 100%; max-height: 120px; width:auto; }
</style>
</head>
<body>
  <div class="cell white"><img src="../assets/8bit-mark.png" alt="8bit mark"></div>
  <div class="cell soft"><img src="../assets/8bit-mark.png" alt="8bit mark on soft"></div>
</body>
</html>
