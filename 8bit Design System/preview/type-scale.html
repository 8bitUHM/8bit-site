<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 30px 36px; box-sizing: border-box; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-sans); font-weight: 700; font-size: 11px; color: var(--fg-3); width: 120px; flex-shrink: 0; }
  .spec { font-family: var(--font-display); font-weight: 700; color: var(--fg-1); line-height: 1; white-space: nowrap; }
  .body { font-family: var(--font-sans); font-weight: 600; color: var(--fg-2); }
  .eyebrow { background: var(--primary-500); color: #fff; }
</style>
</head>
<body>
  <div class="row"><div class="meta">Hero · 72/Bold</div><div class="spec" style="font-size:56px;">8bit</div></div>
  <div class="row"><div class="meta">H1 · 48/Bold</div><div class="spec" style="font-size:44px;">Build, learn, ship</div></div>
  <div class="row"><div class="meta">H2 · 36/Bold</div><div class="spec" style="font-size:33px;">From idea to launch</div></div>
  <div class="row"><div class="meta">H3 · 24/Bold</div><div class="spec" style="font-size:24px;">Digital Solutions</div></div>
  <div class="row"><div class="meta">Lead · 18/600</div><div class="body" style="font-size:18px;">We charge nothing for our services.</div></div>
  <div class="row"><div class="meta">Body · 16/600</div><div class="body" style="font-size:16px;">Students building real software at UH Mānoa.</div></div>
  <div class="row"><div class="meta">Eyebrow · 12</div><span class="eyebrow">What we do</span></div>
</body>
</html>
