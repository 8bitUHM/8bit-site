<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 26px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; gap:16px; }
  .ph { border-radius: var(--radius-lg); overflow:hidden; box-shadow: var(--shadow-pop); position:relative; }
  .ph.big { flex: 1.6; }
  .ph.small { flex:1; }
  .ph img { width:100%; height:160px; object-fit:cover; display:block; }
  .cap { position:absolute; left:14px; bottom:12px; font-family:var(--font-display); font-weight:700; font-size:14px; color:#fff; text-shadow:0 1px 8px rgba(0,0,0,.4); }
  .av { display:flex; flex-direction:column; gap:8px; justify-content:center; }
  .av img { width:80px; height:80px; object-fit:cover; border-radius:20px; box-shadow:var(--shadow-pop); }
</style>
</head>
<body>
  <div class="row">
    <div class="ph big"><img src="../assets/about-us-3.webp" alt="UH Mānoa campus"><span class="cap">Hawaiʻi Hall · UH Mānoa</span></div>
    <div class="av"><img src="../assets/default-member.png" alt="member avatar"><img src="../assets/uh-logo.png" alt="UH logo" style="object-fit:contain;background:#fff;padding:6px;box-sizing:border-box;"></div>
  </div>
</body>
</html>
