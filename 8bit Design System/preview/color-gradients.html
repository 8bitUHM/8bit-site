<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 28px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .grad { height: 78px; border-radius: var(--radius-md); box-shadow: var(--shadow-pop); display:flex; align-items:flex-end; padding:10px 14px; box-sizing:border-box; margin-bottom:12px; }
  .grad span { font-family: var(--font-display); font-weight:700; font-size:15px; color:#fff; text-shadow:0 1px 6px rgba(0,0,0,.25); }
  .grad small { font-weight:700; font-size:11px; color:rgba(255,255,255,.85); display:block; }
</style>
</head>
<body>
  <div class="grad" style="background:linear-gradient(90deg,#14b8a6 0%,#0ea5e9 50%,#8b5cf6 100%)"><span>Hero<small>teal → sky → violet</small></span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div class="grad" style="margin:0;background:linear-gradient(90deg,#fb923c 0%,#ec4899 100%)"><span>Warm</span></div>
    <div class="grad" style="margin:0;background:linear-gradient(90deg,#0ea5e9 0%,#8b5cf6 100%)"><span>Cool</span></div>
    <div class="grad" style="margin:0;background:linear-gradient(135deg,#2dd4bf 0%,#14b8a6 100%)"><span>Mint</span></div>
    <div class="grad" style="margin:0;background:linear-gradient(120deg,#14b8a6 0%,#38bdf8 35%,#f472b6 70%,#fb923c 100%)"><span>Fun</span></div>
  </div>
</body>
</html>
