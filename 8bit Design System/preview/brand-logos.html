<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; box-sizing: border-box; display:flex; align-items:stretch; background:#fff; }
  .cell { display:flex; align-items:center; justify-content:center; padding: 30px; }
  .icon { background: var(--primary-600); }
  .icon img { height: 110px; width:auto; border-radius: 22px; box-shadow: var(--shadow-pop); }
  .word { flex:1; background:#fff; }
  .word img { max-width: 320px; width:100%; height:auto; border-radius: 14px; }
</style>
</head>
<body>
  <div class="cell icon"><img src="../assets/8bit-logo.webp" alt="8bit app icon"></div>
  <div class="cell word"><img src="../assets/8bit-long-logo.png" alt="8it solutions wordmark"></div>
</body>
</html>
