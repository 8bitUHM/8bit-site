<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 30px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .grad-bg { background: var(--gradient-hero); border-radius: var(--radius-lg); padding: 22px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .btn { display:inline-flex; align-items:center; justify-content:center; padding: 13px 28px; font-family:var(--font-sans); font-weight:700; font-size:15px; border-radius:9999px; border:0; cursor:pointer; white-space:nowrap; }
  .primary { color:#fff; background: var(--gradient-warm); box-shadow: var(--shadow-pop-warm); }
  .secondary { color:#fff; background: var(--primary-500); box-shadow: var(--shadow-pop-primary); }
  .white { color: var(--primary-600); background:#fff; box-shadow: var(--shadow-pop); }
  .ghost { color:#fff; background: rgba(255,255,255,.2); backdrop-filter: blur(4px); }
</style>
</head>
<body>
  <div class="grad-bg">
    <button class="btn white">Meet the Team</button>
    <button class="btn ghost">View Projects</button>
  </div>
  <div class="row">
    <button class="btn primary">Get in Touch</button>
    <button class="btn secondary">Send us an Email</button>
  </div>
</body>
</html>
