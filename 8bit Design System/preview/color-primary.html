<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 28px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); }
  .sw { flex: 1; height: 88px; display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.9); }
  .sw.lite span { color: rgba(0,0,0,.45); }
  .hd { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--fg-1); margin: 0 0 4px; }
  .sub { font-size: 12px; font-weight: 600; color: var(--fg-2); margin: 0 0 14px; }
</style>
</head>
<body>
  <p class="hd">Primary · Teal</p>
  <p class="sub">Brand anchor. 500 is the core; 600 is the logo-tile teal.</p>
  <div class="ramp">
    <div class="sw lite" style="background:#f0fdfa"><span>50</span></div>
    <div class="sw lite" style="background:#ccfbf1"><span>100</span></div>
    <div class="sw lite" style="background:#99f6e4"><span>200</span></div>
    <div class="sw lite" style="background:#5eead4"><span>300</span></div>
    <div class="sw" style="background:#2dd4bf"><span>400</span></div>
    <div class="sw" style="background:#14b8a6"><span>500</span></div>
    <div class="sw" style="background:#0d9488"><span>600</span></div>
    <div class="sw" style="background:#0f766e"><span>700</span></div>
    <div class="sw" style="background:#115e59"><span>800</span></div>
    <div class="sw" style="background:#134e4a"><span>900</span></div>
  </div>
</body>
</html>
