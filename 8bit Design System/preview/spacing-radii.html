<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 30px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; gap: 20px; align-items:flex-end; }
  .item { text-align:center; }
  .box { background: var(--primary-500); box-shadow: var(--shadow-soft); }
  .nm { font-family: var(--font-display); font-weight:700; font-size:13px; color:var(--fg-1); margin-top:10px; }
  .v { font-size:11px; font-weight:700; color:var(--fg-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:84px;height:84px;border-radius:8px"></div><div class="nm">sm</div><div class="v">8px</div></div>
    <div class="item"><div class="box" style="width:84px;height:84px;border-radius:16px"></div><div class="nm">md</div><div class="v">16px · inputs</div></div>
    <div class="item"><div class="box" style="width:84px;height:84px;border-radius:24px"></div><div class="nm">lg</div><div class="v">24px · cards</div></div>
    <div class="item"><div class="box" style="width:84px;height:84px;border-radius:32px"></div><div class="nm">xl</div><div class="v">32px</div></div>
    <div class="item"><div class="box" style="width:84px;height:84px;border-radius:9999px"></div><div class="nm">full</div><div class="v">pills</div></div>
  </div>
</body>
</html>
