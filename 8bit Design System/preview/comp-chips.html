<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 30px 36px; box-sizing: border-box; font-family: var(--font-sans); background: var(--gradient-cool); }
  .stats { display:flex; gap:14px; margin-bottom:20px; }
  .chip { display:flex; flex-direction:column; padding:14px 22px; border-radius:16px; background:rgba(255,255,255,.2); backdrop-filter:blur(6px); box-shadow:var(--shadow-pop); }
  .chip .v { font-family:var(--font-display); font-weight:700; font-size:26px; color:#fff; line-height:1; }
  .chip .l { font-size:11px; font-weight:600; color:rgba(255,255,255,.9); margin-top:5px; }
  .list { display:flex; flex-direction:column; gap:10px; }
  .li { display:flex; align-items:center; gap:12px; padding:13px 16px; border-radius:16px; background:rgba(255,255,255,.2); backdrop-filter:blur(6px); }
  .dot { width:11px; height:11px; border-radius:9999px; background:#fff; flex-shrink:0; }
  .li span.t { font-weight:700; font-size:14px; color:#fff; }
</style>
</head>
<body>
  <div class="stats">
    <div class="chip"><span class="v">UHM</span><span class="l">Campus</span></div>
    <div class="chip"><span class="v">Software</span><span class="l">Focus</span></div>
    <div class="chip"><span class="v">Free</span><span class="l">Services</span></div>
  </div>
  <div class="list">
    <div class="li"><span class="dot"></span><span class="t">Full-stack web development</span></div>
    <div class="li"><span class="dot"></span><span class="t">Open source contributions</span></div>
  </div>
</body>
</html>
