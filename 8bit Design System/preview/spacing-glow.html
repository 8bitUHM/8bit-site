<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 40px 36px; box-sizing: border-box; font-family: var(--font-sans); background: #fff; }
  .row { display:flex; gap: 26px; align-items:center; justify-content:center; }
  .item { text-align:center; }
  .box { width: 120px; height: 78px; border-radius: var(--radius-lg); }
  .nm { font-family: var(--font-display); font-weight:700; font-size:12px; color:var(--fg-1); margin-top:20px; }
  .p1 { background:var(--primary-500); box-shadow: var(--shadow-pop-primary); }
  .p2 { background:var(--accent-500); box-shadow: var(--shadow-pop-accent); }
  .p3 { background:var(--violet-500); box-shadow: var(--shadow-pop-violet); }
  .p4 { background:var(--bubble-500); box-shadow: var(--shadow-pop-warm); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box p1"></div><div class="nm">pop-primary</div></div>
    <div class="item"><div class="box p2"></div><div class="nm">pop-accent</div></div>
    <div class="item"><div class="box p3"></div><div class="nm">pop-violet</div></div>
    <div class="item"><div class="box p4"></div><div class="nm">pop-warm</div></div>
  </div>
</body>
</html>
