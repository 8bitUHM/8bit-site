<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 26px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 13px; color: var(--primary-600); margin-bottom: 10px; }
  .big { font-family: var(--font-display); font-weight: 900; color: var(--fg-1); font-size: 60px; line-height: 1; letter-spacing: -0.02em; }
  .weights { display: flex; gap: 30px; margin-top: 18px; align-items: baseline; flex-wrap: wrap; }
  .weights span { font-family: var(--font-display); color: var(--fg-1); font-size: 26px; }
  .w700 { font-weight: 700; } .w800 { font-weight: 800; } .w900 { font-weight: 900; }
  .lab { font-family: var(--font-sans); font-weight: 700; font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; display:block; margin-top:4px; }
</style>
</head>
<body>
  <div class="name">Nunito — Display</div>
  <div class="big">Build &amp; ship</div>
  <div class="weights">
    <div><span class="w700">Aa</span><span class="lab">Bold 700</span></div>
    <div><span class="w800">Aa</span><span class="lab">ExtraBold 800</span></div>
    <div><span class="w900">Aa</span><span class="lab">Black 900 ·display</span></div>
  </div>
</body>
</html>
