<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 32px 36px; box-sizing: border-box; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--primary-600); margin-bottom: 14px; }
  .big { font-family: var(--font-sans); font-weight: 700; color: var(--fg-1); font-size: 54px; line-height: 1.05; }
  .para { font-family: var(--font-sans); font-weight: 600; color: var(--fg-2); font-size: 17px; line-height: 1.6; margin-top: 16px; max-width: 600px; }
  .weights { display: flex; gap: 26px; margin-top: 22px; align-items: baseline; flex-wrap: wrap; }
  .weights span { font-family: var(--font-sans); color: var(--fg-1); font-size: 24px; }
  .w400 { font-weight: 400; } .w600 { font-weight: 600; } .w700 { font-weight: 700; } .w800 { font-weight: 800; }
  .lab { font-family: var(--font-sans); font-weight: 700; font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; display:block; margin-top:4px; }
</style>
</head>
<body>
  <div class="name">Nunito — Body</div>
  <div class="big">Real software, made by students.</div>
  <p class="para">Body copy is set in semibold by default, so even running text feels solid and upbeat. 8bit collaborates with clients across UH Mānoa and beyond.</p>
  <div class="weights">
    <div><span class="w400">Aa</span><span class="lab">400</span></div>
    <div><span class="w600">Aa</span><span class="lab">600 ·default</span></div>
    <div><span class="w700">Aa</span><span class="lab">700</span></div>
    <div><span class="w800">Aa</span><span class="lab">800</span></div>
  </div>
</body>
</html>
