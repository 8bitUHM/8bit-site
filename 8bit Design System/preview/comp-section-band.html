<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; box-sizing: border-box; font-family: var(--font-sans); }
  .band { padding: 26px 36px 0; position:relative; overflow:hidden; }
  .hero { background: var(--gradient-hero); }
  .blob { position:absolute; border-radius:9999px; filter: blur(40px); pointer-events:none; }
  .eyebrow { display:inline-flex; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.1em; padding:5px 14px; border-radius:9999px; background:rgba(255,255,255,.25); color:#fff; backdrop-filter:blur(4px); }
  h2 { font-family:var(--font-display); font-weight:700; font-size:30px; color:#fff; margin:12px 0 0; }
  .wave { display:block; width:100%; height:46px; margin-top:18px; }
  .white { background:#fff; padding: 14px 36px 26px; }
  .white .eyebrow { background:var(--primary-500); color:#fff; }
  .white h2 { color:var(--fg-1); }
</style>
</head>
<body>
  <div class="band hero">
    <span class="blob" style="width:160px;height:160px;background:rgba(255,255,255,.3);top:-50px;left:-20px"></span>
    <span class="blob" style="width:150px;height:150px;background:rgba(244,114,182,.4);bottom:-40px;right:10px"></span>
    <span class="eyebrow">Experience</span>
    <h2 style="position:relative;z-index:1">Step inside a team meeting</h2>
    <svg class="wave" viewBox="0 0 1440 120" preserveAspectRatio="none"><path fill="#fff" d="M0,64 C240,128 480,16 720,48 C960,80 1200,128 1440,72 L1440,120 L0,120 Z"/></svg>
  </div>
  <div class="white">
    <span class="eyebrow">What we do</span>
    <h2>Build, learn, and ship together</h2>
  </div>
</body>
</html>
