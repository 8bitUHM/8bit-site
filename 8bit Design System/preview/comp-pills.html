<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 28px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom: 16px; }
  .eyebrow { font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.1em; padding:6px 16px; border-radius:9999px; color:#fff; }
  .badge { font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:6px 16px; border-radius:9999px; box-shadow:var(--shadow-soft); }
  .tag { font-weight:700; font-size:12px; padding:5px 14px; border-radius:9999px; color:#fff; }
</style>
</head>
<body>
  <div class="row">
    <span class="eyebrow" style="background:var(--primary-500)">What we do</span>
    <span class="eyebrow" style="background:var(--accent-500)">How it works</span>
    <span class="eyebrow" style="background:var(--violet-500)">Join us</span>
  </div>
  <div class="row">
    <span class="badge" style="background:var(--lime-500);color:#fff">Paid Client</span>
    <span class="badge" style="background:#fff;color:var(--gray-900)">Client Project</span>
    <span class="badge" style="background:var(--sunset-500);color:#fff">In Dev</span>
  </div>
  <div class="row">
    <span class="tag" style="background:var(--accent-500)">React</span>
    <span class="tag" style="background:var(--primary-500)">Django</span>
    <span class="tag" style="background:var(--violet-500)">TypeScript</span>
    <span class="tag" style="background:var(--bubble-500)">Figma</span>
  </div>
</body>
</html>
