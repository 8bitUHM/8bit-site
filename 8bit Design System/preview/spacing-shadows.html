<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 38px 36px; box-sizing: border-box; font-family: var(--font-sans); background: var(--gray-50); }
  .row { display:flex; gap: 30px; align-items:center; justify-content:center; }
  .item { text-align:center; }
  .box { width: 120px; height: 78px; background:#fff; border-radius: var(--radius-lg); display:flex; align-items:center; justify-content:center; }
  .nm { font-family: var(--font-display); font-weight:700; font-size:13px; color:var(--fg-1); margin-top:18px; }
  .s1 { box-shadow: var(--shadow-soft); }
  .s2 { box-shadow: var(--shadow-medium); }
  .s3 { box-shadow: var(--shadow-large); }
  .s4 { box-shadow: var(--shadow-pop); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box s1"></div><div class="nm">soft</div></div>
    <div class="item"><div class="box s2"></div><div class="nm">medium</div></div>
    <div class="item"><div class="box s3"></div><div class="nm">large</div></div>
    <div class="item"><div class="box s4"></div><div class="nm">pop ★</div></div>
  </div>
</body>
</html>
