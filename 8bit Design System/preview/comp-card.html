<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 28px 36px; box-sizing: border-box; font-family: var(--font-sans); background:var(--gray-50); display:flex; justify-content:center; }
  .card { width: 360px; background:#fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-pop); overflow:hidden; }
  .imgwrap { position:relative; }
  .imgwrap img { width:100%; height:170px; object-fit:cover; display:block; }
  .badge { position:absolute; top:14px; left:14px; background:var(--lime-500); color:#fff; font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:.04em; padding:5px 13px; border-radius:9999px; box-shadow:var(--shadow-pop); }
  .body { padding: 20px 22px; }
  h3 { font-family:var(--font-display); font-weight:700; font-size:23px; margin:0 0 6px; color:var(--fg-1); }
  p { font-size:13px; font-weight:600; color:var(--fg-2); margin:0 0 12px; line-height:1.5; }
  .built { font-size:12px; font-weight:700; color:var(--primary-700); margin:0 0 14px; }
  .tags { display:flex; gap:7px; margin-bottom:16px; }
  .tag { font-weight:700; font-size:11px; padding:4px 12px; border-radius:9999px; color:#fff; }
  .ghub { display:block; text-align:center; background:var(--gradient-cool); color:#fff; font-weight:700; font-size:13px; padding:11px; border-radius:9999px; box-shadow:var(--shadow-pop-accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="imgwrap"><img src="../assets/about-us-3.webp" alt=""><span class="badge">Client Project</span></div>
    <div class="body">
      <h3>8bit Site</h3>
      <p>The official 8bit website — a Django + React build with a member directory and project showcase.</p>
      <div class="built">Built for 8bit @ UH Mānoa</div>
      <div class="tags"><span class="tag" style="background:var(--accent-500)">React</span><span class="tag" style="background:var(--primary-500)">Django</span></div>
      <div class="ghub">View on GitHub</div>
    </div>
  </div>
</body>
</html>
