<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 28px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(3,1fr); gap:16px; }
  .card { border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-soft); }
  .bar { height: 60px; }
  .lab { padding: 10px 12px; }
  .nm { font-family: var(--font-display); font-weight:700; font-size:14px; color:var(--fg-1); }
  .hex { font-size:11px; font-weight:700; color:var(--fg-3); margin-top:2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card"><div class="bar" style="background:#14b8a6"></div><div class="lab"><div class="nm">Software</div><div class="hex">#14b8a6 · teal</div></div></div>
    <div class="card"><div class="bar" style="background:#0ea5e9"></div><div class="lab"><div class="nm">Business</div><div class="hex">#0ea5e9 · sky</div></div></div>
    <div class="card"><div class="bar" style="background:#8b5cf6"></div><div class="lab"><div class="nm">Design</div><div class="hex">#8b5cf6 · violet</div></div></div>
  </div>
</body>
</html>
