<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 28px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .col { }
  .chip { height: 64px; border-radius: var(--radius-md); box-shadow: var(--shadow-soft); display:flex; align-items:flex-end; padding:7px; box-sizing:border-box; }
  .chip span { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.95); }
  .nm { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--fg-1); margin: 8px 0 2px; }
  .hex { font-size: 11px; font-weight: 700; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="grid">
    <div class="col"><div class="chip" style="background:#f97316"><span>500</span></div><div class="nm">Sunset</div><div class="hex">#f97316</div></div>
    <div class="col"><div class="chip" style="background:#ec4899"><span>500</span></div><div class="nm">Bubble</div><div class="hex">#ec4899</div></div>
    <div class="col"><div class="chip" style="background:#8b5cf6"><span>500</span></div><div class="nm">Violet</div><div class="hex">#8b5cf6</div></div>
    <div class="col"><div class="chip" style="background:#84cc16"><span>500</span></div><div class="nm">Lime</div><div class="hex">#84cc16</div></div>
  </div>
</body>
</html>
