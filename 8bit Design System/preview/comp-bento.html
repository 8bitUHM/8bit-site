<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="darkreader-lock">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body { margin: 0; width: 700px; padding: 28px 36px; box-sizing: border-box; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  .tile { border-radius: var(--radius-lg); padding: 22px; color:#fff; }
  .mint { background:var(--primary-500); box-shadow:var(--shadow-pop-primary); }
  .sky { background:var(--accent-500); box-shadow:var(--shadow-pop-accent); }
  .ib { width:52px; height:52px; border-radius:16px; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .ib svg { width:26px; height:26px; }
  h3 { font-family:var(--font-display); font-weight:700; font-size:21px; margin:0 0 6px; color:#fff; }
  p { font-size:13px; font-weight:600; color:rgba(255,255,255,.9); margin:0; line-height:1.5; }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile mint">
      <div class="ib"><svg fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg></div>
      <h3>Digital Solutions</h3>
      <p>We bring software to life through innovative development.</p>
    </div>
    <div class="tile sky">
      <div class="ib"><svg fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
      <h3>Unique Experiences</h3>
      <p>Real-life software development through hands-on projects.</p>
    </div>
  </div>
</body>
</html>
