<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="darkreader-lock">
<title>8bit Redesign — A×B Hybrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }

  .hyb { height:100%; font-family:'Schibsted Grotesk',sans-serif; background:var(--bg); color:var(--ink);
    transition:none; }
  .hyb .mono { font-family:'JetBrains Mono',monospace; }

  /* themes */
  .hyb.light { --bg:#f7f7f4; --ink:#121311; --dim:#6e6e68; --line:#e3e3dd; --surf:#ffffff; --acc:#1f8a5b; --accink:#0c3d28; }
  .hyb.dark  { --bg:#0c0e10; --ink:#e9eae6; --dim:#878a84; --line:#1e2228; --surf:#121518; --acc:#3fae74; --accink:#bff0d6;
    background-image:linear-gradient(#13161a 1px,transparent 1px),linear-gradient(90deg,#13161a 1px,transparent 1px); background-size:54px 54px; }

  /* nav */
  .hyb .nav { display:flex; align-items:center; justify-content:space-between; padding:24px 44px; border-bottom:1px solid var(--line); }
  .hyb .brand { display:flex; align-items:center; gap:11px; }
  .hyb .brand img { height:28px; }
  .hyb.dark .brand img { filter:grayscale(1) brightness(2.4); }
  .hyb .brand b { font-weight:800; font-size:18px; letter-spacing:-.02em; }
  .hyb .brand .st { width:7px; height:7px; border-radius:50%; background:var(--acc); box-shadow:0 0 8px var(--acc); }
  .hyb .nav-r { display:flex; align-items:center; gap:26px; }
  .hyb .nav-r a { font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.02em; color:var(--dim); text-decoration:none; }
  .hyb .nav-r a:hover { color:var(--ink); }
  .hyb .nav-r .cta { border:1px solid var(--ink); color:var(--ink); padding:9px 15px; }
  .hyb .nav-r .cta:hover { background:var(--ink); color:var(--bg); }

  /* hero */
  .hyb .hero { padding:80px 44px 56px; }
  .hyb .cmd { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--dim); margin-bottom:30px; }
  .hyb .cmd .pr { color:var(--acc); }
  .hyb .cmd .fl { color:var(--ink); }
  .hyb h1 { font-size:84px; line-height:.97; letter-spacing:-.035em; font-weight:800; margin:0; max-width:15ch; }
  .hyb h1 .cur { display:inline-block; width:30px; height:9px; background:var(--acc); margin-left:8px; vertical-align:baseline; animation:bk 1.1s steps(1) infinite; }
  @keyframes bk { 50% { opacity:0; } }
  .hyb .sub { font-size:20px; line-height:1.55; color:var(--dim); max-width:52ch; margin:30px 0 0; font-weight:500; }

  /* meta strip */
  .hyb .meta { display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid var(--line); margin:56px 44px 0; }
  .hyb .meta div { padding:22px 0; border-right:1px solid var(--line); }
  .hyb .meta div:last-child { border-right:0; }
  .hyb .meta .k { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  .hyb .meta .v { font-size:27px; font-weight:700; letter-spacing:-.02em; margin-top:7px; }

  /* section header */
  .hyb .sh { display:flex; justify-content:space-between; align-items:baseline; padding:0 44px; margin:70px 0 16px; }
  .hyb .sh .path { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--acc); }
  .hyb .sh .all { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); text-decoration:none; }

  /* work index */
  .hyb .work { padding:0 44px; }
  .hyb .row { display:grid; grid-template-columns:42px 1fr 210px 64px 24px; align-items:center; gap:16px; padding:22px 8px; border-top:1px solid var(--line); cursor:pointer; transition:background .2s ease,padding .2s ease; }
  .hyb .row:last-child { border-bottom:1px solid var(--line); }
  .hyb .row:hover { background:var(--surf); padding-left:18px; }
  .hyb .row .n { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); }
  .hyb .row .nm { font-size:27px; font-weight:700; letter-spacing:-.02em; }
  .hyb .row:hover .nm { color:var(--acc); }
  .hyb .row .tg { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); }
  .hyb .row .yr { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); }
  .hyb .row .ar { font-family:'JetBrains Mono',monospace; color:var(--acc); opacity:0; transition:opacity .2s ease; }
  .hyb .row:hover .ar { opacity:1; }

  /* services — minimal bordered cells */
  .hyb .svc { display:grid; grid-template-columns:repeat(3,1fr); gap:0; padding:0 44px; border:1px solid var(--line); margin:0 44px; }
  .hyb .cell { padding:32px 28px 30px; border-right:1px solid var(--line); min-height:230px; display:flex; flex-direction:column; }
  .hyb .svc { margin-left:44px; margin-right:44px; padding:0; }
  .hyb .cell:last-child { border-right:0; }
  .hyb .cell .ci { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--acc); }
  .hyb .cell h3 { font-size:25px; font-weight:700; letter-spacing:-.02em; margin:14px 0 10px; }
  .hyb .cell p { font-size:15px; line-height:1.55; color:var(--dim); margin:0; font-weight:500; }
  .hyb .cell .ct { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dim); margin-top:auto; padding-top:18px; }

  /* footer status bar */
  .hyb .foot { display:flex; align-items:center; gap:18px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); padding:18px 44px; border-top:1px solid var(--line); margin-top:66px; }
  .hyb .foot .on { color:var(--acc); }
  .hyb .foot .sp { margin-left:auto; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const M = "../assets/8bit-mark.png";
const page = (theme) => `
<div class="hyb ${theme}">
  <div class="nav">
    <div class="brand"><span class="st"></span><img src="${M}" alt="8bit"><b>8bit</b></div>
    <div class="nav-r"><a>work</a><a>team</a><a>services</a><a>learning</a><a class="cta">start_project</a></div>
  </div>
  <div class="hero">
    <div class="cmd"><span class="pr">8bit ~ %</span> <span class="fl">./build</span> --for "UH &amp; local clients" --cost 0</div>
    <h1>We build real software, in the open.<span class="cur"></span></h1>
    <p class="sub">A student-led software studio at UH Mānoa shipping production web apps for the university and local clients — hands-on, collaborative, free of charge.</p>
  </div>
  <div class="meta">
    <div><div class="k">// based</div><div class="v">UH Mānoa</div></div>
    <div><div class="k">// discipline</div><div class="v">Full-stack</div></div>
    <div><div class="k">// cost to clients</div><div class="v">$0</div></div>
  </div>
  <div class="sh"><span class="path">~/work</span><a class="all">all projects →</a></div>
  <div class="work">
    <div class="row"><span class="n">01</span><span class="nm">8bit Site</span><span class="tg">react · django</span><span class="yr">2025</span><span class="ar">→</span></div>
    <div class="row"><span class="n">02</span><span class="nm">Custodian Manager</span><span class="tg">internal · uhm hr</span><span class="yr">2025</span><span class="ar">→</span></div>
    <div class="row"><span class="n">03</span><span class="nm">ACM Mānoa</span><span class="tg">vite · react</span><span class="yr">2024</span><span class="ar">→</span></div>
    <div class="row"><span class="n">04</span><span class="nm">Theta360 Guide</span><span class="tg">360° · javascript</span><span class="yr">2024</span><span class="ar">→</span></div>
  </div>
  <div class="sh"><span class="path">~/services</span><span class="all">free for clients</span></div>
  <div class="svc">
    <div class="cell"><span class="ci">01</span><h3>Static Website</h3><p>A sleek, polished presence built with modern tooling to showcase your brand.</p><span class="ct">// html · css · js</span></div>
    <div class="cell"><span class="ci">02</span><h3>Dynamic Web App</h3><p>Powerful backends, dynamic content, and an intuitive admin portal.</p><span class="ct">// react · django · postgres</span></div>
    <div class="cell"><span class="ci">03</span><h3>Infrastructure</h3><p>Deployment, hosting, and domains on AWS or UH-hosted servers.</p><span class="ct">// aws · docker · ci</span></div>
  </div>
  <div class="foot"><span class="on">● online</span> 8bit @ uh mānoa <span class="sp">github</span> discord <span>© 2025</span></div>
</div>`;

function Frame({ html }) { return <div style={{ height: "100%" }} dangerouslySetInnerHTML={{ __html: html }} />; }

ReactDOM.createRoot(document.getElementById("root")).render(
  <DesignCanvas>
    <DCSection id="hyb" title="8bit Redesign — Minimal × Terminal" subtitle="Swiss layout + developer/mono detailing, restrained palette, one muted accent. Same page, both themes.">
      <DCArtboard id="light" label="Light" width={1180} height={1320}><Frame html={page("light")} /></DCArtboard>
      <DCArtboard id="dark" label="Dark" width={1180} height={1320}><Frame html={page("dark")} /></DCArtboard>
    </DCSection>
  </DesignCanvas>
);
</script>
</body>
</html>
