<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="darkreader-lock">
<title>8bit Redesign — Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }

  /* ================= DIRECTION A — STUDIO (Swiss minimal) ================= */
  .dir-a { --ink:#111110; --paper:#f6f6f3; --line:#dededa; --dim:#6b6b66; --accent:#1b3bff;
    background:var(--paper); color:var(--ink); font-family:'Schibsted Grotesk',sans-serif; height:100%; }
  .dir-a .mono { font-family:'Space Mono',monospace; }
  .dir-a .nav { display:flex; align-items:center; justify-content:space-between; padding:26px 48px; border-bottom:1px solid var(--line); }
  .dir-a .brand { display:flex; align-items:center; gap:12px; }
  .dir-a .brand img { height:30px; }
  .dir-a .brand b { font-weight:800; font-size:19px; letter-spacing:-.02em; }
  .dir-a .nav-r { display:flex; align-items:center; gap:30px; }
  .dir-a .nav-r a { font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.04em; color:var(--dim); text-decoration:none; text-transform:uppercase; }
  .dir-a .nav-r a:hover { color:var(--ink); }
  .dir-a .cta { font-family:'Space Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:.04em; border:1px solid var(--ink); padding:10px 18px; color:var(--ink); text-decoration:none; }
  .dir-a .cta:hover { background:var(--ink); color:var(--paper); }
  .dir-a .hero { padding:90px 48px 70px; }
  .dir-a .ey { font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:34px; }
  .dir-a .hero h1 { font-size:92px; line-height:.96; letter-spacing:-.035em; font-weight:800; margin:0; max-width:14ch; }
  .dir-a .hero h1 em { font-style:normal; color:var(--accent); }
  .dir-a .hero .sub { font-size:21px; line-height:1.5; color:var(--dim); max-width:46ch; margin:34px 0 0; font-weight:500; }
  .dir-a .meta { display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid var(--line); margin:64px 48px 0; }
  .dir-a .meta div { padding:24px 0; border-right:1px solid var(--line); }
  .dir-a .meta div:last-child { border-right:0; }
  .dir-a .meta .k { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
  .dir-a .meta .v { font-size:30px; font-weight:700; letter-spacing:-.02em; margin-top:8px; }
  .dir-a .work { padding:74px 48px 60px; }
  .dir-a .work-h { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px; }
  .dir-a .work-h h2 { font-size:15px; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.1em; font-weight:700; margin:0; }
  .dir-a .work-h a { font-family:'Space Mono',monospace; font-size:12px; color:var(--dim); text-decoration:none; text-transform:uppercase; }
  .dir-a .row { display:grid; grid-template-columns:48px 1fr 220px 90px 30px; align-items:center; gap:18px; padding:24px 8px; border-top:1px solid var(--line); cursor:pointer; transition:padding .25s ease,background .25s ease; }
  .dir-a .row:hover { padding-left:20px; background:#fff; }
  .dir-a .row:last-child { border-bottom:1px solid var(--line); }
  .dir-a .row .n { font-family:'Space Mono',monospace; font-size:13px; color:var(--dim); }
  .dir-a .row .nm { font-size:30px; font-weight:700; letter-spacing:-.02em; }
  .dir-a .row .tg { font-family:'Space Mono',monospace; font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; }
  .dir-a .row .yr { font-family:'Space Mono',monospace; font-size:13px; color:var(--dim); }
  .dir-a .row .ar { font-size:20px; color:var(--accent); opacity:0; transition:opacity .25s ease; }
  .dir-a .row:hover .ar { opacity:1; }
  .dir-a .row:hover .nm { color:var(--accent); }

  /* ================= DIRECTION B — TERMINAL (developer, dark) ============= */
  .dir-b { --bg:#0a0c10; --panel:#0e1118; --line:#1c2230; --txt:#e6edf3; --dim:#8b949e; --grn:#3fb950; --cyan:#38bdf8; --amber:#f0b429;
    background:var(--bg); color:var(--txt); font-family:'JetBrains Mono',monospace; height:100%; background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px); background-size:46px 46px; background-position:-1px -1px; }
  .dir-b .nav { display:flex; align-items:center; justify-content:space-between; padding:20px 36px; border-bottom:1px solid var(--line); background:rgba(10,12,16,.7); backdrop-filter:blur(6px); }
  .dir-b .brand { display:flex; align-items:center; gap:11px; }
  .dir-b .brand img { height:26px; filter:grayscale(1) brightness(2.2); }
  .dir-b .brand b { font-weight:800; font-size:16px; }
  .dir-b .brand .dot { width:9px; height:9px; border-radius:50%; background:var(--grn); box-shadow:0 0 10px var(--grn); }
  .dir-b .nav-r { display:flex; align-items:center; gap:8px; }
  .dir-b .nav-r a { font-size:13px; color:var(--dim); text-decoration:none; padding:7px 12px; }
  .dir-b .nav-r a:hover { color:var(--txt); }
  .dir-b .nav-r .run { color:#06210f; background:var(--grn); padding:9px 15px; font-weight:700; }
  .dir-b .wrap { padding:54px 36px 40px; }
  .dir-b .term { border:1px solid var(--line); background:rgba(14,17,24,.92); box-shadow:0 30px 80px -30px #000; }
  .dir-b .tbar { display:flex; align-items:center; gap:8px; padding:13px 16px; border-bottom:1px solid var(--line); }
  .dir-b .tbar i { width:11px; height:11px; border-radius:50%; display:inline-block; }
  .dir-b .tbar span { margin-left:10px; font-size:12px; color:var(--dim); }
  .dir-b .tbody { padding:34px 40px 44px; }
  .dir-b .ln { font-size:15px; margin:0 0 12px; color:var(--dim); }
  .dir-b .ln .p { color:var(--grn); }
  .dir-b .ln .c { color:var(--cyan); }
  .dir-b .ln .o { color:var(--txt); }
  .dir-b .term h1 { font-size:62px; line-height:1.02; letter-spacing:-.03em; font-weight:800; margin:26px 0 0; }
  .dir-b .term h1 .hl { color:var(--grn); }
  .dir-b .cur { display:inline-block; width:18px; height:8px; background:var(--grn); margin-left:6px; animation:blink 1.1s steps(1) infinite; vertical-align:baseline; }
  @keyframes blink { 50% { opacity:0; } }
  .dir-b .sub { font-size:15px; color:var(--dim); margin:24px 0 0; max-width:60ch; line-height:1.6; }
  .dir-b .files { padding:8px 36px 44px; }
  .dir-b .files .fh { font-size:13px; color:var(--dim); padding:14px 4px; }
  .dir-b .frow { display:grid; grid-template-columns:200px 1fr 150px 70px; gap:18px; padding:14px 14px; border:1px solid var(--line); border-bottom:0; font-size:14px; align-items:center; background:rgba(14,17,24,.5); }
  .dir-b .frow:last-child { border-bottom:1px solid var(--line); }
  .dir-b .frow:hover { background:rgba(63,185,80,.06); }
  .dir-b .frow .fn { color:var(--grn); font-weight:700; }
  .dir-b .frow .fd { color:var(--dim); }
  .dir-b .frow .ft { color:var(--cyan); font-size:12px; }
  .dir-b .frow .badge { font-size:11px; color:var(--amber); border:1px solid #3a2f12; padding:3px 8px; justify-self:start; }

  /* ================= DIRECTION C — SIGNAL (premium + vibrant) ============= */
  .dir-c { --ink:#0f0f12; --paper:#ffffff; --soft:#f3f3f1; --dim:#5c5c66; --red:#ff4d2e; --blue:#2563eb; --grn:#13b67a;
    background:var(--paper); color:var(--ink); font-family:'Hanken Grotesk',sans-serif; height:100%; }
  .dir-c .disp { font-family:'Space Grotesk',sans-serif; }
  .dir-c .nav { display:flex; align-items:center; justify-content:space-between; padding:24px 46px; }
  .dir-c .brand { display:flex; align-items:center; gap:12px; }
  .dir-c .brand img { height:32px; }
  .dir-c .brand b { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; letter-spacing:-.01em; }
  .dir-c .nav-r { display:flex; align-items:center; gap:28px; }
  .dir-c .nav-r a { font-size:15px; font-weight:600; color:var(--ink); text-decoration:none; }
  .dir-c .nav-r a:hover { color:var(--blue); }
  .dir-c .cta { background:var(--blue); color:#fff; font-weight:700; font-size:15px; padding:11px 20px; border-radius:9px; text-decoration:none; }
  .dir-c .hero { padding:80px 46px 60px; }
  .dir-c .pill { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; background:var(--soft); padding:7px 14px; border-radius:999px; margin-bottom:30px; }
  .dir-c .pill i { width:8px; height:8px; border-radius:50%; background:var(--grn); }
  .dir-c .hero h1 { font-family:'Space Grotesk',sans-serif; font-size:88px; line-height:.98; letter-spacing:-.035em; font-weight:700; margin:0; max-width:15ch; }
  .dir-c .hero h1 .r { color:var(--red); } .dir-c .hero h1 .b { color:var(--blue); } .dir-c .hero h1 .g { color:var(--grn); }
  .dir-c .hero .sub { font-size:21px; color:var(--dim); max-width:50ch; line-height:1.55; margin:32px 0 36px; font-weight:500; }
  .dir-c .tags { display:flex; gap:10px; flex-wrap:wrap; }
  .dir-c .tag { font-size:13px; font-weight:700; padding:8px 15px; border-radius:8px; color:#fff; }
  .dir-c .svc { padding:30px 46px 64px; }
  .dir-c .svc-h { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:26px; }
  .dir-c .svc-h h2 { font-family:'Space Grotesk',sans-serif; font-size:15px; text-transform:uppercase; letter-spacing:.12em; font-weight:700; margin:0; color:var(--dim); }
  .dir-c .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .dir-c .card { border-radius:16px; padding:32px 30px; color:#fff; min-height:300px; display:flex; flex-direction:column; }
  .dir-c .card .num { font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; opacity:.7; }
  .dir-c .card h3 { font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:700; letter-spacing:-.02em; margin:auto 0 12px; }
  .dir-c .card p { font-size:15.5px; line-height:1.55; margin:0; opacity:.92; font-weight:500; }
  .dir-c .card .ar { font-size:22px; margin-top:22px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const M = "../assets/8bit-mark.png";

const htmlA = `
<div class="dir-a">
  <div class="nav">
    <div class="brand"><img src="${M}" alt="8bit"><b>8bit</b></div>
    <div class="nav-r"><a>Work</a><a>Team</a><a>Services</a><a>Learning</a><a class="cta">Start a project</a></div>
  </div>
  <div class="hero">
    <div class="ey">// Student software studio — UH Mānoa</div>
    <h1>We build real software, <em>in the open.</em></h1>
    <p class="sub">A student-led studio shipping production web apps for the University of Hawaiʻi and local clients — hands-on, collaborative, free of charge.</p>
  </div>
  <div class="meta">
    <div><div class="k">Based</div><div class="v">UH Mānoa</div></div>
    <div><div class="k">Discipline</div><div class="v">Full-stack</div></div>
    <div><div class="k">Cost to clients</div><div class="v">$0</div></div>
  </div>
  <div class="work">
    <div class="work-h"><h2>Selected work</h2><a>All projects →</a></div>
    <div class="row"><span class="n">01</span><span class="nm">8bit Site</span><span class="tg">React · Django</span><span class="yr">2025</span><span class="ar">→</span></div>
    <div class="row"><span class="n">02</span><span class="nm">Custodian Manager</span><span class="tg">Internal tool · UHM HR</span><span class="yr">2025</span><span class="ar">→</span></div>
    <div class="row"><span class="n">03</span><span class="nm">ACM Mānoa</span><span class="tg">Vite · React</span><span class="yr">2024</span><span class="ar">→</span></div>
    <div class="row"><span class="n">04</span><span class="nm">Theta360 Guide</span><span class="tg">360° · JavaScript</span><span class="yr">2024</span><span class="ar">→</span></div>
  </div>
</div>`;

const htmlB = `
<div class="dir-b">
  <div class="nav">
    <div class="brand"><span class="dot"></span><img src="${M}" alt="8bit"><b>8bit@uhm</b></div>
    <div class="nav-r"><a>~/work</a><a>~/team</a><a>~/services</a><a class="run">&gt; start_project</a></div>
  </div>
  <div class="wrap">
    <div class="term">
      <div class="tbar"><i style="background:#ff5f56"></i><i style="background:#ffbd2e"></i><i style="background:#27c93f"></i><span>8bit — zsh — 96×24</span></div>
      <div class="tbody">
        <p class="ln"><span class="p">8bit ➜</span> <span class="o">whoami</span></p>
        <p class="ln">student software org · University of Hawaiʻi at Mānoa</p>
        <p class="ln"><span class="p">8bit ➜</span> <span class="o">./build</span> <span class="c">--for</span> "UH &amp; local clients" <span class="c">--cost</span> 0</p>
        <h1>We ship <span class="hl">production</span><br>software.<span class="cur"></span></h1>
        <p class="sub"># Real client work and open source, built hands-on by students. Full-stack web apps, internal tools, and infrastructure — deployed and maintained.</p>
      </div>
    </div>
  </div>
  <div class="files">
    <div class="fh"># ls ~/projects</div>
    <div class="frow"><span class="fn">8bit-site/</span><span class="fd">Org site — members, projects, learning portal</span><span class="ft">react·django</span><span class="badge">live</span></div>
    <div class="frow"><span class="fn">custodian-manager/</span><span class="fd">UHM HR work-assignment tool</span><span class="ft">react·postgres</span><span class="badge">in-dev</span></div>
    <div class="frow"><span class="fn">acmmanoa-site/</span><span class="fd">ACM student chapter website</span><span class="ft">vite·react</span><span class="badge">live</span></div>
    <div class="frow"><span class="fn">theta360-guide/</span><span class="fd">Automotive 360° walkthrough guide</span><span class="ft">javascript</span><span class="badge">live</span></div>
  </div>
</div>`;

const htmlC = `
<div class="dir-c">
  <div class="nav">
    <div class="brand"><img src="${M}" alt="8bit"><b>8bit</b></div>
    <div class="nav-r"><a>Work</a><a>Team</a><a>Services</a><a>Learning</a><a class="cta">Start a project</a></div>
  </div>
  <div class="hero">
    <div class="pill"><i></i> Open for client projects · Fall 2025</div>
    <h1 class="disp">Real software. <span class="r">Real clients.</span> Built by <span class="b">students.</span></h1>
    <p class="sub">8bit is a student software organization at UH Mānoa. We design, build, and ship full-stack web apps for the university and local clients — at no cost.</p>
    <div class="tags">
      <span class="tag" style="background:#2563eb">Full-stack web</span>
      <span class="tag" style="background:#13b67a">Open source</span>
      <span class="tag" style="background:#ff4d2e">Client work</span>
      <span class="tag" style="background:#7c3aed">Mentorship</span>
    </div>
  </div>
  <div class="svc">
    <div class="svc-h"><h2>What we do</h2></div>
    <div class="cards">
      <div class="card" style="background:#2563eb"><span class="num">01</span><h3>Static Website</h3><p>A sleek, polished online presence built with modern tooling to showcase your brand and message.</p><span class="ar">→</span></div>
      <div class="card" style="background:#13b67a"><span class="num">02</span><h3>Dynamic Web App</h3><p>Applications with a powerful backend, dynamic content, and an intuitive admin portal for easy management.</p><span class="ar">→</span></div>
      <div class="card" style="background:#0f0f12"><span class="num">03</span><h3>Infrastructure</h3><p>Deployment, hosting, and domain management on AWS or UH-hosted servers — we handle it end to end.</p><span class="ar">→</span></div>
    </div>
  </div>
</div>`;

function Frame({ html }) { return <div style={{ height: "100%" }} dangerouslySetInnerHTML={{ __html: html }} />; }

ReactDOM.createRoot(document.getElementById("root")).render(
  <DesignCanvas>
    <DCSection id="dirs" title="8bit Website Redesign — Three Directions" subtitle="Each shows nav · hero · one content section. Pick one, or mix elements across them.">
      <DCArtboard id="a" label="A · Studio — Swiss minimal, one electric accent" width={1180} height={1180}><Frame html={htmlA} /></DCArtboard>
      <DCArtboard id="b" label="B · Terminal — developer aesthetic, dark, mono" width={1180} height={1080}><Frame html={htmlB} /></DCArtboard>
      <DCArtboard id="c" label="C · Signal — premium, vibrant color blocks" width={1180} height={1180}><Frame html={htmlC} /></DCArtboard>
    </DCSection>
  </DesignCanvas>
);
</script>
</body>
</html>
